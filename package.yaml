spec-version: 0.36.0
name: caldron
version: 0.0.1
synopsis: Caldron - A web-based file storage application utilizing linked data
description: Caldron - A web-based file storage application utilizing linked data
author: Tim McIver <tim@timmciver.com>
maintainer: Tim McIver <tim@timmciver.com>
github: tmciver/caldron
category: Web

ghc-options: -Wall -fno-warn-incomplete-uni-patterns

default-extensions:
  - NoImplicitPrelude
  - OverloadedStrings

dependencies:
  - base # >= 4.13 && < 5
  - text
  - time
  - protolude

library:
  source-dirs: lib
  exposed-modules:
    - Control.Monad.Error
    - Caldron.LinkedData
    - Caldron.File
    - Caldron.EmailAddress
    - Caldron.Logger
  dependencies:
    - aeson
    - http-media
    - modern-uri
    - monad-logger
    - protolude
    - transformers

executables:
  caldron-server:
    main: Main.hs
    source-dirs: server
    other-modules:
      - Caldron.App
      - Caldron.Config
      - Caldron.Crypto
      - Caldron.HSPARQL
      - Caldron.HTTPClient
      - Caldron.MediaTypeDiscover
      - Caldron.Options
      - Caldron.Profile
      - Caldron.WebID
      - Caldron.RDF4H
      - Caldron.Servant
      - Caldron.Server
      - Caldron.User
      - Caldron.View.File
      - Caldron.View.HTML
      - Caldron.View.Home
    dependencies:
      - aeson
      - bytestring
      - case-insensitive
      - containers
      - crypton
      - crypton-x509
      - crypton-pem
      - data-default
      - directory
      - exceptions
      - filepath
      - hsparql
      - http-client
      - http-media
      - http-types
      - lucid
      - magic
      - modern-uri
      - monad-logger
      - mtl
      - mustache
      - optparse-applicative
      - parsec
      - rainbow-hash
      - caldron
      - random
      - rdf4h
      - servant
      - servant-client
      - servant-multipart
      - servant-multipart-client
      - servant-server
      - temporary
      - transformers
      - uuid
      - wai
      - warp
      - yaml

  caldron:
    main:                Main.hs
    source-dirs:
    - cli
    - cli/src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -Wall
    dependencies:
    - caldron
    - rainbow-hash
    - protolude
    - aeson
    - bytestring
    - containers
    - crypton-connection
    - crypton-x509
    - crypton-x509-store
    - crypton-x509-validation
    - cryptostore
    - data-default
    - directory
    - exceptions
    - filepath
    - fsnotify
    - http-client
    - http-client-tls
    - http-types
    - lens
    - modern-uri
    - monad-logger
    - optparse-applicative
    - ordered-containers
    - text
    - tls
    - unix
    - wreq
    - yaml

