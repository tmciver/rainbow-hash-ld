spec-version: 0.36.0
name: rainbow-hash-ld
version: 0.0.1
synopsis: A web-based file storage application utilizing linked data
description: A web-based file storage application utilizing linked data
author: Tim McIver <tim@timmciver.com>
maintainer: Tim McIver <tim@timmciver.com>
github: tmciver/rainbow-hash-ld
category: Web

ghc-options: -Wall -fno-warn-incomplete-uni-patterns

default-extensions:
  - NoImplicitPrelude
  - OverloadedStrings

dependencies:
  - base # >= 4.13 && < 5
  - text
  - time
  - protolude

library:
  source-dirs: lib
  exposed-modules:
    - Control.Monad.Error
    - RainbowHash.LinkedData
    - RainbowHash.File
    - RainbowHash.EmailAddress
  dependencies:
    - aeson
    - http-media
    - modern-uri
    - monad-logger
    - protolude
    - transformers

executables:
  rhld-server:
    main: Main.hs
    source-dirs: server
    other-modules:
      - RainbowHash.App
      - RainbowHash.Config
      - RainbowHash.Crypto
      - RainbowHash.HSPARQL
      - RainbowHash.HTTPClient
      - RainbowHash.MediaTypeDiscover
      - RainbowHash.Options
      - RainbowHash.Profile
      - RainbowHash.WebID
      - RainbowHash.RDF4H
      - RainbowHash.Servant
      - RainbowHash.Server
      - RainbowHash.User
      - RainbowHash.View.File
      - RainbowHash.View.HTML
      - RainbowHash.View.Home
    dependencies:
      - aeson
      - bytestring
      - case-insensitive
      - containers
      - crypton
      - crypton-x509
      - crypton-pem
      - data-default
      - directory
      - exceptions
      - filepath
      - hsparql
      - http-client
      - http-media
      - http-types
      - lucid
      - magic
      - modern-uri
      - monad-logger
      - mtl
      - mustache
      - optparse-applicative
      - parsec
      - rainbow-hash
      - rainbow-hash-ld
      - random
      - rdf4h
      - servant
      - servant-client
      - servant-multipart
      - servant-multipart-client
      - servant-server
      - temporary
      - transformers
      - uuid
      - wai
      - warp
      - yaml

  rhld:
    main:                Main.hs
    source-dirs:
    - cli
    - cli/src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -Wall
    dependencies:
    - rainbow-hash-ld
    - rainbow-hash
    - protolude
    - aeson
    - bytestring
    - containers
    - crypton-connection
    - crypton-x509
    - crypton-x509-store
    - crypton-x509-validation
    - cryptostore
    - data-default
    - directory
    - exceptions
    - filepath
    - fsnotify
    - http-client
    - http-client-tls
    - http-types
    - lens
    - modern-uri
    - monad-logger
    - optparse-applicative
    - ordered-containers
    - text
    - tls
    - unix
    - wreq
    - yaml

